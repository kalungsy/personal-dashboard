<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Darvas Box Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #252840;
    --border: #2d3155;
    --text: #e8eaf6;
    --text-dim: #9197c0;
    --accent: #5c6bc0;
    --buy: #26c96c;
    --sell: #ef5350;
    --hold: #ffa726;
    --tab-active: #5c6bc0;
    --tab-inactive: #252840;
  }
  @media (prefers-color-scheme: light) {
    :root {
      --bg: #f0f2f5;
      --surface: #ffffff;
      --surface2: #f5f6fa;
      --border: #dde1f0;
      --text: #1a1d2e;
      --text-dim: #5c6480;
      --accent: #3f51b5;
      --tab-active: #3f51b5;
      --tab-inactive: #e8eaf6;
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 16px; line-height: 1.5; }

  /* Header */
  .header { background: var(--surface); border-bottom: 1px solid var(--border); padding: 12px 16px; }
  .header h1 { font-size: 18px; font-weight: 700; color: var(--text); }
  .header p { font-size: 13px; color: var(--text-dim); margin-top: 2px; }

  /* Tabs */
  .tabs { display: flex; flex-wrap: wrap; background: var(--surface); border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100; }
  .tab-btn {
    flex: 1; min-width: 70px; min-height: 44px; border: none; background: var(--tab-inactive); color: var(--text-dim);
    font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; letter-spacing: 0.3px;
    border-bottom: 3px solid transparent; padding: 4px 4px 2px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  }
  .tab-btn .tab-ticker { font-size: 13px; font-weight: 700; }
  .tab-btn .tab-signal { font-size: 10px; font-weight: 700; padding: 1px 5px; border-radius: 3px; letter-spacing: 0.5px; }
  .tab-signal-BUY  { background: rgba(38,201,108,0.2);  color: var(--buy); }
  .tab-signal-SELL { background: rgba(239,83,80,0.2);   color: var(--sell); }
  .tab-signal-HOLD { background: rgba(255,167,38,0.2);  color: var(--hold); }
  .tab-btn.active { background: var(--tab-active); color: #fff; border-bottom-color: var(--accent); }
  .tab-btn.active .tab-signal { opacity: 0.9; }
  .tab-btn:not(.active):hover { background: var(--surface2); color: var(--text); }

  /* Panels */
  .panel { display: none; padding: 12px; max-width: 800px; margin: 0 auto; }
  .panel.active { display: block; }

  /* Signal Card */
  .signal-card { background: var(--surface); border-radius: 12px; padding: 20px; margin-bottom: 12px; border: 1px solid var(--border); }
  .signal-badge {
    display: inline-block; font-size: 28px; font-weight: 800; padding: 8px 24px;
    border-radius: 8px; letter-spacing: 2px; margin-bottom: 12px;
  }
  .badge-BUY { background: rgba(38,201,108,0.18); color: var(--buy); border: 2px solid var(--buy); }
  .badge-SELL { background: rgba(239,83,80,0.18); color: var(--sell); border: 2px solid var(--sell); }
  .badge-HOLD { background: rgba(255,167,38,0.18); color: var(--hold); border: 2px solid var(--hold); }
  .signal-reason { font-size: 15px; color: var(--text); margin-bottom: 8px; }
  .signal-date { font-size: 13px; color: var(--text-dim); }
  .signal-no-data { font-size: 15px; color: var(--text-dim); padding: 12px 0; }

  /* Box explanation callout */
  .box-explain { font-size: 12px; color: var(--text-dim); background: var(--surface2); border-radius: 8px; padding: 8px 12px; margin-bottom: 12px; border-left: 3px solid var(--accent); line-height: 1.6; }
  .box-explain strong { color: var(--text); }

  /* Box Stats */
  .box-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
  .stat-card { background: var(--surface); border-radius: 10px; padding: 14px; border: 1px solid var(--border); }
  .stat-label { font-size: 12px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 4px; }
  .stat-value { font-size: 20px; font-weight: 700; color: var(--text); }
  .stat-value.up { color: var(--buy); }
  .stat-value.down { color: var(--sell); }
  .stat-value.neutral { color: var(--hold); }

  /* Signal counts */
  .counts-row { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .count-card { background: var(--surface); border-radius: 10px; padding: 12px 8px; text-align: center; border: 1px solid var(--border); }
  .count-num { font-size: 22px; font-weight: 700; }
  .count-lbl { font-size: 11px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }
  .count-BUY .count-num { color: var(--buy); }
  .count-SELL .count-num { color: var(--sell); }
  .count-HOLD .count-num { color: var(--hold); }

  /* Charts */
  .chart-card { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); }
  .chart-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .chart-title { font-size: 14px; font-weight: 600; color: var(--text-dim); text-transform: uppercase; letter-spacing: 0.5px; }
  .chart-wrap { position: relative; height: 220px; width: 100%; }

  /* Range buttons */
  .range-btns { display: flex; gap: 4px; }
  .range-btn {
    font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 6px;
    border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim);
    cursor: pointer; transition: all 0.15s; letter-spacing: 0.3px;
  }
  .range-btn:hover { border-color: var(--accent); color: var(--text); }
  .range-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }

  /* History table */
  .history-card { background: var(--surface); border-radius: 12px; padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); overflow-x: auto; }
  .history-title { font-size: 14px; font-weight: 600; color: var(--text-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th { text-align: left; color: var(--text-dim); font-weight: 600; font-size: 12px; padding: 6px 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  td { padding: 8px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  .sig-pill { display: inline-block; font-size: 11px; font-weight: 700; padding: 3px 9px; border-radius: 4px; letter-spacing: 0.5px; }
  .sig-BUY { background: rgba(38,201,108,0.15); color: var(--buy); }
  .sig-SELL { background: rgba(239,83,80,0.15); color: var(--sell); }
  .sig-HOLD { background: rgba(255,167,38,0.15); color: var(--hold); }

  /* Loading */
  .loading { text-align: center; padding: 60px 20px; color: var(--text-dim); font-size: 16px; }
  .error-msg { background: rgba(239,83,80,0.1); border: 1px solid var(--sell); border-radius: 10px; padding: 16px; color: var(--sell); font-size: 14px; }
</style>
</head>

<div class="header">
  <h1>脙聝脗掳脙聜脗聼脙聜脗聯脙聜脗娄 Darvas Box Dashboard</h1>
  <p id="updated-time">Loading脙聝脗垄脙聜脗聙脙聜脗娄</p>
</div>

<div class="tabs" id="tab-bar">
  <!-- Tabs injected by JS after data loads -->
</div>

<div id="panels-container"></div>

<script>
const TICKERS = ['CVX','COP','OXY','NKE','UNH','TSLA','MSFT','AAPL','SOUN','ACHR','ROKU','IONQ'];
let allData = {};
let activeTab = 'CVX';
const charts = {};
const chartRanges = {}; // per-ticker selected range

const RANGES = [
  { label: '3D', days: 3 },
  { label: '1W', days: 5 },
  { label: '1M', days: 21 },
  { label: '3M', days: 999 }
];

const COLORS = {
  BUY: '#26c96c', SELL: '#ef5350', HOLD: '#ffa726',
  boxTop: '#26c96c', boxBottom: '#ef5350', price: '#7986cb', volume: '#5c6bc0', avgVol: '#ff7043'
};

function switchTab(ticker) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  const tb = document.getElementById('tab-' + ticker);
  const pn = document.getElementById('panel-' + ticker);
  if (tb) tb.classList.add('active');
  if (pn) pn.classList.add('active');
  activeTab = ticker;
  if (charts[ticker + '_price']) charts[ticker + '_price'].resize();
  if (charts[ticker + '_vol']) charts[ticker + '_vol'].resize();
}

function fmt(n) { return n != null ? '$' + Number(n).toFixed(2) : 'N/A'; }
function fmtVol(n) { return n != null ? (n / 1e6).toFixed(1) + 'M' : 'N/A'; }

function setRange(ticker, rangeLabel) {
  chartRanges[ticker] = rangeLabel;
  // Update active state on range buttons
  RANGES.forEach(r => {
    const btn = document.getElementById(`range-${ticker}-${r.label}`);
    if (btn) btn.classList.toggle('active', r.label === rangeLabel);
  });
  // Re-render both charts with new range
  const tdata = allData[ticker];
  if (tdata) {
    renderPriceChart(ticker, tdata, rangeLabel);
    renderVolChart(ticker, tdata, rangeLabel);
  }
}

function sliceByRange(labels, rangeLabel) {
  const r = RANGES.find(x => x.label === rangeLabel) || RANGES[RANGES.length - 1];
  const n = Math.min(r.days, labels.length);
  return labels.length - n; // start index
}

function buildTabs(data) {
  const bar = document.getElementById('tab-bar');
  bar.innerHTML = '';
  const cont = document.getElementById('panels-container');
  cont.innerHTML = '';
  TICKERS.forEach((t, i) => {
    const td = data[t] || { ticker: t, signals: [] };
    const latest = td.signals && td.signals.length > 0 ? td.signals[td.signals.length - 1] : null;
    const sig = latest ? latest.signal : 'HOLD';
    const btn = document.createElement('button');
    btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
    btn.id = 'tab-' + t;
    btn.onclick = () => switchTab(t);
    btn.innerHTML = `<span class="tab-ticker">${t}</span><span class="tab-signal tab-signal-${sig}">${sig}</span>`;
    bar.appendChild(btn);
    const panel = document.createElement('div');
    panel.id = 'panel-' + t;
    panel.className = 'panel' + (i === 0 ? ' active' : '');
    panel.innerHTML = '<div class="loading">Loading脙聝脗垄脙聜脗聙脙聜脗娄</div>';
    cont.appendChild(panel);
  });
}

function renderTicker(ticker, tdata) {
  const panel = document.getElementById('panel-' + ticker);
  if (!panel) return;
  const sigs = tdata.signals || [];
  const latest = sigs.length > 0 ? sigs[sigs.length - 1] : null;

  let counts = { BUY: 0, SELL: 0, HOLD: 0 };
  sigs.forEach(s => { if (counts[s.signal] !== undefined) counts[s.signal]++; });

  // Build range button HTML (shared by both charts)
  const rangeBtns = RANGES.map(r =>
    `<button id="range-${ticker}-${r.label}" class="range-btn${r.label === '3M' ? ' active' : ''}" onclick="setRange('${ticker}','${r.label}')">${r.label}</button>`
  ).join('');

  let html = '';

  // Signal card
  html += '<div class="signal-card">';
  if (latest) {
    const sig = latest.signal;
    html += `<div class="signal-badge badge-${sig}">${sig}</div>`;
    html += `<div class="signal-reason">${latest.reason || ''}</div>`;
    html += `<div class="signal-date">脙聝脗掳脙聜脗聼脙聜脗聯脙聜脗聟 ${latest.date} &nbsp;|&nbsp; Close: ${fmt(latest.close)}</div>`;
  } else {
    html += '<div class="signal-no-data">脙聝脗垄脙聜脗職脙聜脗聽脙聝脗炉脙聜脗赂脙聜脗聫 No signal data available for ' + ticker + '.</div>';
  }
  html += '</div>';

  // Box explanation
  html += `<div class="box-explain">
    <strong>How the box is determined:</strong> The algorithm scans for a <strong>3-day confirmation rule</strong> 脙聝脗垄脙聜脗聙脙聜脗聰
    a peak high is set as the box ceiling once 3 consecutive days' highs don't exceed it.
    The floor is the lowest low while price stayed inside the box.
    A <strong>BUY</strong> fires when today's close breaks <em>above</em> the ceiling;
    a <strong>SELL</strong> fires when it breaks <em>below</em> the floor.
    Use the range buttons below to zoom into the 3-day breakout window.
  </div>`;

  // Box stats
  html += '<div class="box-stats">';
  html += `<div class="stat-card"><div class="stat-label">脙聝脗掳脙聜脗聼脙聜脗聯脙聜脗聢 Box Ceiling</div><div class="stat-value up">${fmt(latest?.box_top)}</div></div>`;
  html += `<div class="stat-card"><div class="stat-label">脙聝脗掳脙聜脗聼脙聜脗聯脙聜脗聣 Box Floor</div><div class="stat-value down">${fmt(latest?.box_bottom)}</div></div>`;
  const volRatio = latest && latest.avg_volume ? (latest.volume / latest.avg_volume).toFixed(2) : null;
  const vrClass = volRatio ? (volRatio >= 1.2 ? 'up' : volRatio < 0.8 ? 'down' : 'neutral') : '';
  html += `<div class="stat-card"><div class="stat-label">脙聝脗掳脙聜脗聼脙聜脗聯脙聜脗聤 Volume</div><div class="stat-value">${fmtVol(latest?.volume)}</div></div>`;
  html += `<div class="stat-card"><div class="stat-label">脙聝脗掳脙聜脗聼脙聜脗聯脙聜脗聤 Vol Ratio vs 20d Avg</div><div class="stat-value ${vrClass}">${volRatio ? volRatio + 'x' : 'N/A'}</div></div>`;
  html += '</div>';

  // Signal counts
  html += '<div class="counts-row">';
  html += `<div class="count-card count-BUY"><div class="count-num">${counts.BUY}</div><div class="count-lbl">BUY</div></div>`;
  html += `<div class="count-card count-SELL"><div class="count-num">${counts.SELL}</div><div class="count-lbl">SELL</div></div>`;
  html += `<div class="count-card count-HOLD"><div class="count-num">${counts.HOLD}</div><div class="count-lbl">HOLD</div></div>`;
  html += '</div>';

  // Price chart (with range buttons)
  html += `<div class="chart-card">
    <div class="chart-header">
      <div class="chart-title">Price &amp; Darvas Box</div>
      <div class="range-btns">${rangeBtns}</div>
    </div>
    <div class="chart-wrap"><canvas id="chart-price-${ticker}"></canvas></div>
  </div>`;

  // Volume chart (no separate range buttons 脙聝脗垄脙聜脗聙脙聜脗聰 shares same range)
  html += `<div clas="chart-card">
    <div class="chart-title">Volume</div>
    <div class="chart-wrap"><canvas id="chart-vol-${ticker}"></canvas></div>
  </div>`;

  // History table
  html += '<div class="history-card"><div class="history-title">Signal History</div>';
  if (sigs.length === 0) {
    html += '<p style="color:var(--text-dim);font-size:14px">No history yet.</p>';
  } else {
    html += '<table><thead><tr><th>Date</th><th>Signal</th><th>Close</th><th>Box Range</th></tr></thead><tbody>';
    const sorted = [...sigs].reverse();
    sorted.forEach(s => {
      html += `<tr>
        <td>${s.date}</td>
        <td><span class="sig-pill sig-${s.signal}">${s.signal}</span></td>
        <td>${fmt(s.close)}</td>
        <td>${fmt(s.box_bottom)} 脙聝脗垄脙聜脗聙脙聜脗聯 ${fmt(s.box_top)}</td>
      </tr>`;
    });
    html += '</tbody></table>';
  }
  html += '</div>';

  panel.innerHTML = html;

  if (sigs.length > 0 || tdata.price_history) {
    const range = chartRanges[ticker] || '3M';
    renderPriceChart(ticker, tdata, range);
    renderVolChart(ticker, tdata, range);
  }
}

function renderPriceChart(ticker, tdata, rangeLabel) {
  const ctx = document.getElementById('chart-price-' + ticker);
  if (!ctx) return;
  if (charts[ticker + '_price']) charts[ticker + '_price'].destroy();

  const ph = tdata.price_history;
  const sigs = tdata.signals || [];

  const allLabels = ph ? ph.dates : sigs.map(s => s.date);
  const allCloses = ph ? ph.close : sigs.map(s => s.close);
  const boxTop = ph ? ph.box_top : (sigs[0]?.box_top ?? null);
  const boxBot = ph ? ph.box_bottom : (sigs[0]?.box_bottom ?? null);

  // Slice to selected range
  const start = sliceByRange(allLabels, rangeLabel || '3M');
  const labels = allLabels.slice(start);
  const closes = allCloses.slice(start);
  const tops = labels.map(() => boxTop);
  const bots = labels.map(() => boxBot);

  const sigMap = {};
  sigs.forEach(s => { sigMap[s.date] = { close: s.close, signal: s.signal }; });
  const dotData = labels.map(d => sigMap[d] ? sigMap[d].close : null);
  const dotColors = labels.map(d => sigMap[d] ? COLORS[sigMap[d].signal] : 'transparent');

  // For 3D view, show every point; for longer ranges limit tick density
  const maxTicks = labels.length <= 5 ? labels.length : 8;

  charts[ticker + '_price'] = new Chart(ctx, {
    type: 'line',
    data: {
      labels,
      datasets: [
        { label: 'Box Ceiling', data: tops, borderColor: COLORS.boxTop, borderWidth: 1.5, borderDash: [6,4], pointRadius: 0, fill: false, tension: 0, order: 3 },
        { label: 'Box Floor', data: bots, borderColor: COLORS.boxBottom, borderWidth: 1.5, borderDash: [6,4], pointRadius: 0, backgroundColor: 'rgba(38,201,108,0.07)', fill: '-1', tension: 0, order: 4 },
        { label: 'Close Price', data: closes, borderColor: COLORS.price, borderWidth: 2, pointRadius: labels.length <= 5 ? 4 : 0, fill: false, tension: 0.3, order: 2 },
        { label: 'Signal', data: dotData, borderColor: 'transparent', backgroundColor: dotColors, pointRadius: labels.map(d => sigMap[d] ? 7 : 0), pointBorderColor: dotColors, pointBorderWidth: 2, showLine: false, fill: false, order: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#9197c0', font: { size: 12 }, boxWidth: 20, padding: 10, filter: item => item.text !== 'Signal' } },
        tooltip: { callbacks: { label: ctx => { if (ctx.dataset.label === 'Signal' && ctx.raw === null) return null; return ctx.dataset.label + ': $' + Number(ctx.raw).toFixed(2); } } }
      },
      scales: {
        x: { ticks: { color: '#9197c0', maxTicksLimit: maxTicks, font: { size: 11 } }, grid: { color: 'rgba(150,150,200,0.1)' } },
        y: { ticks: { color: '#9197c0', callback: v => '$' + v, font: { size: 11 } }, grid: { color: 'rgba(150,150,200,0.1)' } }
      }
    }
  });
}

function renderVolChart(ticker, tdata, rangeLabel) {
  const ctx = document.getElementById('chart-vol-' + ticker);
  if (!ctx) return;
  if (charts[ticker + '_vol']) charts[ticker + '_vol'].destroy();

  const ph = tdata.price_history;
 const sigs = tdata.signals || [];

  const allLabels = ph ? ph.dates : sigs.map(s => s.date);
  const allVols = ph ? ph.volume.map(v => v / 1e6) : sigs.map(s => s.volume / 1e6);

  // Slice to selected range
  const start = sliceByRange(allLabels, rangeLabel || '3M');
  const labels = allLabels.slice(start);
  const vols = allVols.slice(start);

  // 20d avg still computed over full history, then sliced
  const fullAvgLine = allVols.map((_, i) => {
    const w = allVols.slice(Math.max(0, i - 19), i + 1);
    return parseFloat((w.reduce((a, b) => a + b, 0) / w.length).toFixed(2));
  });
  const avgLine = fullAvgLine.slice(start);

  const sigMap = {};
  sigs.forEach(s => { sigMap[s.date] = s.signal; });
  const barColors = labels.map(d => sigMap[d] ? COLORS[sigMap[d]] + '99' : '#5c6bc099');

  const maxTicks = labels.length <= 5 ? labels.length : 8;

  charts[ticker + '_vol'] = new Chart(ctx, {
    type: 'bar',
    data: {
      labels,
      datasets: [
        { label: 'Volume (M)', data: vols, backgroundColor: barColors, order: 2 },
        { label: '20d Avg (M)', data: avgLine, borderColor: COLORS.avgVol, borderWidth: 2, pointRadius: 0, type: 'line', fill: false, tension: 0.3, order: 1 }
      ]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { labels: { color: '#9197c0', font: { size: 12 }, boxWidth: 20, padding: 10 } },
        tooltip: { callbacks: { label: ctx => ctx.dataset.label + ': ' + Number(ctx.raw).toFixed(1) + 'M' } }
      },
      scales: {
        x: { ticks: { color: '#9197c0', maxTicksLimit: maxTicks, font: { size: 11 } }, grid: { color: 'rgba(150,150,200,0.1)' } },
        y: { ticks: { color: '#9197c0', callback: v => v + 'M', font: { size: 11 } }, grid: { color: 'rgba(150,150,200,0.1)' } }
      }
    }
  });
}

async function loadData() {
  try {
    const resp = await fetch('signals.json?v=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    allData = await resp.json();

    // Default range for all tickers
    TICKERS.forEach(t => { chartRanges[t] = '3M'; });

    // Build tab bar + panels dynamically
    buildTabs(allData);

    // Update timestamp
    const times = TICKERS.map(t => allData[t]?.last_updated).filter(Boolean);
    document.getElementById('updated-time').textContent = times.length ? 'Last updated: ' + times[times.length - 1] : 'No recent update';

    TICKERS.forEach(t => {
      const td = allData[t] || { ticker: t, signals: [] };
      renderTicker(t, td);
    });

    // Start on first ticker
    switchTab(TICKERS[0]);
  } catch (err) {
    document.getElementById('panels-container').innerHTML = `<div style="padding:20px"><div class="error-msg">脙聝脗垄脙聜脗職脙聜脗聽脙聝脗炉脙聜脗赂脙聜脗聫 Could not load signals.json: ${err.message}</div></div>`;
    document.getElementById('updated-time').textContent = 'Error loading data';
  }
}

loadData();
</script>
</body>
</html>
